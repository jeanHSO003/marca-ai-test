<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MarcaAI - Cadastro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.container{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#2563eb;
    font-size:35px;
}

.logo p{
    color:#64748b;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input,
.form-group select{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#2563eb;
}

.btn{
    width:100%;
    border:none;
    background:#2563eb;
    color:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
}

.btn:hover{
    background:#1d4ed8;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.hidden{
    display:none;
}

.msg{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>MarcaAI</h1>
        <p>Cadastro de Usuário</p>
    </div>

    <form id="formCadastro">

        <div class="form-group">
            <label>Tipo de Conta</label>

            <select id="tipoUsuario">
                <option value="cliente">Cliente</option>
                <option value="lojista">Dono da Loja</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" required>
        </div>

        <!-- CAMPOS LOJISTA -->

        <div id="camposLoja" class="hidden">

            <div class="form-group">
                <label>Nome da Loja</label>
                <input type="text" id="nomeLoja">
            </div>

            <div class="form-group">
                <label>CNPJ</label>
                <input type="text" id="cnpj">
            </div>

        </div>

        <button type="submit" class="btn">
            Criar Conta
        </button>

    </form>

    <div class="msg" id="mensagem"></div>

    <div class="login-link">
        Já possui conta?
        <a href="Login.html">Entrar</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/Cadastro.js"></script>

</body>
</html>
